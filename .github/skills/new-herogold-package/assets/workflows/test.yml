name: Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
  workflow_call:

concurrency: test-${{ github.sha }}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Cache pytest results
      id: cache-pytest
      uses: actions/cache@v4
      with:
        path: .pytest_cache
        key: ${{ runner.os }}-pytest-${{ hashFiles('**/tests/**/*.py', 'src/**') }}
        restore-keys: |
          ${{ runner.os }}-pytest-

    - name: Install uv
      if: steps.cache-pytest.outputs.cache-hit != 'true'
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Install dependencies
      if: steps.cache-pytest.outputs.cache-hit != 'true'
      run: uv sync --group test

    - name: Run tests
      if: steps.cache-pytest.outputs.cache-hit != 'true'
      run: uv run pytest .
